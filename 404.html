<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Sayfa bulunamadı — Ayça Takı</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .nf-wrap { min-height: 78vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 22px; }
    .nf-code { font-family: "Playfair Display", Georgia, serif; font-size: clamp(3.5rem, 12vw, 6rem); color: var(--accent); line-height: 1; margin: 0; }
    .nf-wrap h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); margin: 12px 0 10px; }
    .nf-wrap p { color: var(--muted); max-width: 460px; margin: 0 auto 26px; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav-inner">
      <a href="/" class="brand">Ayça <span>Takı</span></a>
    </div>
  </header>

  <main class="nf-wrap">
    <div>
      <p class="nf-code">404</p>
      <h1>Aradığınız sayfa bulunamadı</h1>
      <p>Sayfa taşınmış ya da hiç var olmamış olabilir. Koleksiyona göz atmak için ana sayfaya dönebilirsiniz.</p>
      <a href="/" class="btn btn-primary">Ana sayfaya dön</a>
    </div>
  </main>
</body>
</html>
